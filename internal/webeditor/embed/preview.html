<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelClock Preview</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.2em;
            font-weight: 500;
            color: #808080;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select, button {
            padding: 6px 12px;
            border: 1px solid #404040;
            border-radius: 4px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 0.9em;
            cursor: pointer;
        }

        select:hover, button:hover {
            border-color: #606060;
            background: #333;
        }

        button.active {
            background: #4a7c59;
            border-color: #5a9c69;
        }

        .devices-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            align-items: flex-start;
        }

        .device-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .device-label {
            font-size: 0.9em;
            color: #888;
            font-weight: 500;
        }

        .canvas-wrapper {
            background: #000;
            padding: 4px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .device-panel canvas {
            display: block;
            image-rendering: pixelated;
        }

        .device-status {
            display: flex;
            gap: 12px;
            font-size: 0.8em;
            color: #666;
        }

        .device-status span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #4a7c59; }
        .status-dot.disconnected { background: #7c4a4a; }

        .error-message {
            background: #3a2020;
            border: 1px solid #5a3030;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
        }

        .error-message h2 {
            color: #c08080;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .error-message p {
            color: #999;
            font-size: 0.9em;
        }

        .error-message code {
            background: #2a2020;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <div class="preview-header">
            <h1>SteelClock Display Preview</h1>
            <div class="controls">
                <select id="zoom-select" title="Zoom level">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="4" selected>4x</option>
                    <option value="8">8x</option>
                </select>
                <button id="mode-btn" class="active" title="Toggle live/static mode">Live</button>
            </div>
        </div>

        <div class="devices-grid" id="devices-grid"></div>
    </div>

    <div class="error-message" id="error-container" style="display: none;">
        <h2>Preview Not Available</h2>
        <p>Set <code>backend: "webclient"</code> in your configuration to enable live preview.</p>
    </div>

    <script>
        // Multi-device preview application
        const PreviewApp = {
            devices: [],
            zoom: 4,
            isLive: true,

            async init() {
                document.getElementById('zoom-select').addEventListener('change', (e) => {
                    this.setZoom(parseInt(e.target.value, 10));
                });

                document.getElementById('mode-btn').addEventListener('click', () => {
                    this.toggleMode();
                });

                await this.loadDevices();
            },

            async loadDevices() {
                try {
                    // Try multi-device endpoint first
                    const devResponse = await fetch('/api/preview/devices');
                    const devInfo = await devResponse.json();

                    if (devInfo.devices && devInfo.devices.length > 0) {
                        this.createDevicePanels(devInfo.devices);
                        return;
                    }

                    // Fallback: try single-device endpoint
                    const response = await fetch('/api/preview');
                    const info = await response.json();

                    if (info.available) {
                        this.createDevicePanels([{id: 'default', width: info.width, height: info.height}]);
                    } else {
                        this.showError();
                    }
                } catch (err) {
                    console.error('Failed to load devices:', err);
                    this.showError();
                }
            },

            createDevicePanels(deviceList) {
                const grid = document.getElementById('devices-grid');
                grid.innerHTML = '';

                document.getElementById('main-container').style.display = 'block';
                document.getElementById('error-container').style.display = 'none';

                for (const dev of deviceList) {
                    const panel = this.createPanel(dev);
                    grid.appendChild(panel.element);
                    this.devices.push(panel);

                    if (this.isLive) {
                        panel.connect();
                    }
                }
            },

            createPanel(dev) {
                const panel = document.createElement('div');
                panel.className = 'device-panel';

                // Label (only show if multiple devices or non-default ID)
                const showLabel = this.devices.length > 0 || dev.id !== 'default';
                const label = document.createElement('div');
                label.className = 'device-label';
                label.textContent = `${dev.id} (${dev.width}x${dev.height})`;
                if (showLabel) panel.appendChild(label);

                // Canvas
                const wrapper = document.createElement('div');
                wrapper.className = 'canvas-wrapper';
                const canvas = document.createElement('canvas');
                canvas.width = dev.width * this.zoom;
                canvas.height = dev.height * this.zoom;
                wrapper.appendChild(canvas);
                panel.appendChild(wrapper);

                // Status bar
                const status = document.createElement('div');
                status.className = 'device-status';
                status.innerHTML = `
                    <span><span class="status-dot"></span><span class="status-text">Connecting...</span></span>
                    <span class="fps-display">0 FPS</span>
                    <span>${dev.width}x${dev.height}</span>
                `;
                panel.appendChild(status);

                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;

                const devicePanel = {
                    element: panel,
                    canvas: canvas,
                    ctx: ctx,
                    statusDot: status.querySelector('.status-dot'),
                    statusText: status.querySelector('.status-text'),
                    fpsDisplay: status.querySelector('.fps-display'),
                    label: label,
                    deviceId: dev.id,
                    width: dev.width,
                    height: dev.height,
                    ws: null,
                    frameCount: 0,
                    lastFrameTime: performance.now(),

                    connect: function() {
                        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                        const url = `${protocol}//${window.location.host}/api/preview/ws?device=${encodeURIComponent(this.deviceId)}`;
                        this.ws = new WebSocket(url);

                        this.ws.onopen = () => {
                            this.statusDot.className = 'status-dot connected';
                            this.statusText.textContent = 'Connected';
                        };

                        this.ws.onmessage = (event) => {
                            try {
                                const data = JSON.parse(event.data);
                                if (data.type === 'frame') {
                                    this.renderFrame(data.frame);
                                    this.updateFPS();
                                } else if (data.type === 'config') {
                                    this.width = data.width;
                                    this.height = data.height;
                                    this.updateSize(PreviewApp.zoom);
                                }
                            } catch (err) {
                                console.error('Failed to parse message:', err);
                            }
                        };

                        this.ws.onclose = () => {
                            this.statusDot.className = 'status-dot disconnected';
                            this.statusText.textContent = 'Disconnected';
                            if (PreviewApp.isLive) {
                                setTimeout(() => {
                                    if (PreviewApp.isLive) {
                                        this.statusText.textContent = 'Reconnecting...';
                                        this.connect();
                                    }
                                }, 1000);
                            }
                        };

                        this.ws.onerror = (err) => {
                            console.error('WebSocket error:', err);
                        };
                    },

                    disconnect: function() {
                        if (this.ws) {
                            this.ws.close();
                            this.ws = null;
                        }
                        this.statusDot.className = 'status-dot disconnected';
                        this.statusText.textContent = 'Paused';
                        this.fpsDisplay.textContent = '0 FPS';
                    },

                    updateSize: function(zoom) {
                        this.canvas.width = this.width * zoom;
                        this.canvas.height = this.height * zoom;
                        this.ctx.imageSmoothingEnabled = false;
                    },

                    renderFrame: function(frameData) {
                        let bytes;
                        if (typeof frameData === 'string') {
                            const binary = atob(frameData);
                            bytes = new Uint8Array(binary.length);
                            for (let i = 0; i < binary.length; i++) {
                                bytes[i] = binary.charCodeAt(i);
                            }
                        } else {
                            bytes = new Uint8Array(frameData);
                        }

                        const w = this.width;
                        const h = this.height;
                        const imageData = this.ctx.createImageData(w, h);
                        const data = imageData.data;

                        let bitIndex = 0;
                        for (let y = 0; y < h; y++) {
                            for (let x = 0; x < w; x++) {
                                const byteIndex = Math.floor(bitIndex / 8);
                                const bitPos = 7 - (bitIndex % 8);

                                let pixelOn = false;
                                if (byteIndex < bytes.length) {
                                    pixelOn = (bytes[byteIndex] & (1 << bitPos)) !== 0;
                                }

                                const pixelIndex = (y * w + x) * 4;
                                const color = pixelOn ? 255 : 0;
                                data[pixelIndex] = color;
                                data[pixelIndex + 1] = color;
                                data[pixelIndex + 2] = color;
                                data[pixelIndex + 3] = 255;

                                bitIndex++;
                            }
                        }

                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = w;
                        tempCanvas.height = h;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.putImageData(imageData, 0, 0);

                        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                        this.ctx.drawImage(tempCanvas, 0, 0, this.canvas.width, this.canvas.height);
                    },

                    updateFPS: function() {
                        this.frameCount++;
                        const now = performance.now();
                        const elapsed = now - this.lastFrameTime;
                        if (elapsed >= 1000) {
                            const fps = Math.round(this.frameCount * 1000 / elapsed);
                            this.fpsDisplay.textContent = `${fps} FPS`;
                            this.frameCount = 0;
                            this.lastFrameTime = now;
                        }
                    },
                };

                return devicePanel;
            },

            showError() {
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('error-container').style.display = 'block';
            },

            setZoom(zoom) {
                this.zoom = zoom;
                for (const dev of this.devices) {
                    dev.updateSize(zoom);
                }
            },

            toggleMode() {
                if (this.isLive) {
                    this.isLive = false;
                    document.getElementById('mode-btn').textContent = 'Static';
                    document.getElementById('mode-btn').classList.remove('active');
                    for (const dev of this.devices) {
                        dev.disconnect();
                    }
                } else {
                    this.isLive = true;
                    document.getElementById('mode-btn').textContent = 'Live';
                    document.getElementById('mode-btn').classList.add('active');
                    for (const dev of this.devices) {
                        dev.connect();
                    }
                }
            },
        };

        document.addEventListener('DOMContentLoaded', () => {
            PreviewApp.init();
        });
    </script>
</body>
</html>
